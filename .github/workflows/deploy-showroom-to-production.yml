        dqv-ap-no/files/demo-data-quality-assessments.ttl text/turtle en demo-data-quality-assessments/demo-data-quality-assessments.ttl
        dqv-ap-no/files/demo-data-quality-assessments-en.html text/html en demo-data-quality-assessments/demo-data-quality-assessments-en.html
        dqv-ap-no/files/demo-data-quality-assessments-nb.html text/html nb demo-data-quality-assessments/demo-data-quality-assessments-nb.html
