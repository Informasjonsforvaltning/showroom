name: Build adocs and deploy showroom to data.norge.no

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - cpsv-ap-no/**
      - dcat-ap-no/**
      - demo-uris/**
      - dqv-ap-no/**
      - dummy-assets/**
      - modelldcat-ap-no/**
      - overview/**
      - skos-ap-no/**
      - xkos-ap-no/**
  workflow_dispatch:   # manual full deploy of every module

jobs:
  # On push: detect which modules changed so only those rebuild.
  # On workflow_dispatch: skipped, and every module job runs unconditionally.
  filter_path:
    name: Setup path filter
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      cpsv: ${{ steps.filter.outputs.cpsv }}
      dcat: ${{ steps.filter.outputs.dcat }}
      demo_uris: ${{ steps.filter.outputs.demo_uris }}
      dqv: ${{ steps.filter.outputs.dqv }}
      dummy_assets: ${{ steps.filter.outputs.dummy_assets }}
      modelldcat: ${{ steps.filter.outputs.modelldcat }}
      overview: ${{ steps.filter.outputs.overview }}
      skos: ${{ steps.filter.outputs.skos }}
      xkos: ${{ steps.filter.outputs.xkos }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          ref: 'main'
          filters: |
            cpsv:
              - 'cpsv-ap-no/**'
            dcat:
              - 'dcat-ap-no/**'
            demo_uris:
              - 'demo-uris/**'
            dqv:
              - 'dqv-ap-no/**'
            dummy_assets:
              - 'dummy-assets/**'
            modelldcat:
              - 'modelldcat-ap-no/**'
            overview:
              - 'overview/**'
            skos:
              - 'skos-ap-no/**'
            xkos:
              - 'xkos-ap-no/**'

  cpsv:
    needs: filter_path
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.filter_path.outputs.cpsv == 'true') }}
    name: cpsv-ap-no
    uses: Informasjonsforvaltning/workflows/.github/workflows/specification-upload-files.yaml@main
    with:
      host: "https://data.norge.no"
      ontology: "cpsv-ap-no"
      ontology-type: "showroom"
      program: >-
        asciidoctor -D cpsv-ap-no/files -o demo-services-events-en.html -a lang=en cpsv-ap-no/files/main-en.adoc &&
        asciidoctor -D cpsv-ap-no/files -o demo-services-events-nb.html -a lang=nb cpsv-ap-no/files/main-nb.adoc &&
        asciidoctor -D cpsv-ap-no -o index-en.html -a lang=en cpsv-ap-no/main-en.adoc &&
        asciidoctor -D cpsv-ap-no -o index-nb.html -a lang=nb cpsv-ap-no/main-nb.adoc
      files: |
        cpsv-ap-no/index-en.html text/html en
        cpsv-ap-no/index-nb.html text/html nb
        cpsv-ap-no/images/Digdir.png image/png en images/Digdir.png
        cpsv-ap-no/images/demoPublicService1-explanation.png image/png en images/demoPublicService1-explanation.png
        cpsv-ap-no/files/demo-services-events.ttl text/turtle en demo-services-events/demo-services-events.ttl
        cpsv-ap-no/files/demo-services-events-en.html text/html en demo-services-events/demo-services-events-en.html
        cpsv-ap-no/files/demo-services-events-nb.html text/html nb demo-services-events/demo-services-events-nb.html
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      STATIC_RDF_SERVER_API_KEY: ${{ secrets.STATIC_RDF_SERVER_API_KEY }}

  dcat:
    needs: filter_path
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.filter_path.outputs.dcat == 'true') }}
    name: dcat-ap-no
    uses: Informasjonsforvaltning/workflows/.github/workflows/specification-upload-files.yaml@main
    with:
      host: "https://data.norge.no"
      ontology: "dcat-ap-no"
      ontology-type: "showroom"
      program: >-
        asciidoctor -D dcat-ap-no/files -o demo-datasets-en.html -a lang=en dcat-ap-no/files/main-en.adoc &&
        asciidoctor -D dcat-ap-no/files -o demo-datasets-nb.html -a lang=nb dcat-ap-no/files/main-nb.adoc &&
        asciidoctor -D dcat-ap-no -o index-en.html -a lang=en dcat-ap-no/main-en.adoc &&
        asciidoctor -D dcat-ap-no -o index-nb.html -a lang=nb dcat-ap-no/main-nb.adoc
      files: |
        dcat-ap-no/index-en.html text/html en
        dcat-ap-no/index-nb.html text/html nb
        dcat-ap-no/images/Digdir.png image/png en images/Digdir.png
        dcat-ap-no/files/demo-datasets.ttl text/turtle en demo-datasets/demo-datasets.ttl
        dcat-ap-no/files/demo-datasets-en.html text/html en demo-datasets/demo-datasets-en.html
        dcat-ap-no/files/demo-datasets-nb.html text/html nb demo-datasets/demo-datasets-nb.html
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      STATIC_RDF_SERVER_API_KEY: ${{ secrets.STATIC_RDF_SERVER_API_KEY }}

  demo_uris:
    needs: filter_path
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.filter_path.outputs.demo_uris == 'true') }}
    name: demo-uris
    uses: Informasjonsforvaltning/workflows/.github/workflows/specification-upload-files.yaml@main
